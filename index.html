<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradeIn Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode Defaults */
        --bg-main: #F2F4F6;
        --bg-card: #FFFFFF;
        --text-primary: #111827;
        --text-secondary: #6B7280;
        --border-color: rgba(0, 0, 0, 0.08);
        --surface-light: rgba(0, 0, 0, 0.05);
        --surface-lighter: rgba(0, 0, 0, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.8);
      }

      .dark {
        /* Dark Mode Overrides */
        --bg-main: #0A0B0A;
        --bg-card: #1A1C1A;
        --text-primary: #FFFFFF;
        --text-secondary: #A0A0A0;
        --border-color: rgba(255, 255, 255, 0.08);
        --surface-light: rgba(255, 255, 255, 0.05);
        --surface-lighter: rgba(255, 255, 255, 0.1);
        --glass-bg: rgba(26, 28, 26, 0.8);
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3CAF8D', // Teal
              accentLime: '#A4E367', // Lime
              accentPurple: '#746CE7', // Purple
              
              // Semantic Colors mapped to CSS Variables
              bgDark: 'var(--bg-main)', 
              cardDark: 'var(--bg-card)', 
              textPrimary: 'var(--text-primary)',
              textSecondary: 'var(--text-secondary)',
              borderBase: 'var(--border-color)',
              surfaceLight: 'var(--surface-light)',
              surfaceLighter: 'var(--surface-lighter)',
              glassBg: 'var(--glass-bg)',

              success: '#4ADE80',
              error: '#EF4444',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
